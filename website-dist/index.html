<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cheap .NET Web App</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #f6f7f9;
      color: #18212f;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(720px, calc(100% - 32px));
      padding: 40px;
      background: white;
      border: 1px solid #d8dde6;
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(24, 33, 47, 0.08);
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1;
    }

    p {
      margin: 0 0 16px;
      font-size: 1.1rem;
      line-height: 1.55;
    }

    p:last-child {
      margin-bottom: 0;
    }

    code {
      padding: 2px 6px;
      border-radius: 4px;
      background: #edf2f7;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello from .NET</h1>
    <p>This static fallback page is deployed by CDK to S3 website hosting, the lowest-cost AWS option for a simple web front end.</p>
    <p>TeamCity can replace this with the published Blazor WebAssembly output during the build.</p>
  </main>
</body>
</html>
